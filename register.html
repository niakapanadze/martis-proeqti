<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration</title>
</head>
<body>
    <h1>This is the registration page</h1>
    <div>
    <label>Enter your username:</label>
    <input type = "text">
    </div>
    <br>
    <div>
    <label>Enter your email:</label>
    <input type = "email">
    </div>
    <br>
    <div>
    <label>Enter your password:</label>
    <input type = "password">
    </div>
    <br>
    <div>
    <label>Confirm your password:</label>
    <input type = "password">
    </div>
    <br>
    <div>
    <label>Enter your age:</label>
    <input type = "number">
    </div>
    <br>
    <div>
    <label>Enter your birth date:</label>
    <input type = "date">
    </div>
    <br>
    <div>
    <label>Enter your gender:</label>
    <input type="radio" name="gender"> Female
    <input type="radio" name="gender"> Male
    </div>
    <br>
    <div>
    <label>Check this box if you are not a robot:</label>
    <input type = "checkbox">
    </div>
    <br>
    <div>
    <button type="reset">Cancel</button>
    <button type="submit">Register</button>
    </div>
    <br>
    <a href="choices">Choose your cat</a>
    <br>
    <img src="https://cdn.pixabay.com/photo/2022/08/24/15/54/cat-7408152_1280.jpg" alt="cat" width = 200>
</body>
</html>
